name: CI-CD Pipeline

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run unit tests
              run: PYTHONPATH=. pytest tests/test_core.py

    build:
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Create build artifact
              run: |
                  mkdir -p build
                  echo "Task Score Calculator Build" > build/artifact.txt
                  echo "Commit: ${{ github.sha }}" >> build/artifact.txt
                  echo "Build completed successfully" >> build/artifact.txt

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-build
                  path: build/artifact.txt

    deploy_staging:
        runs-on: ubuntu-latest
        needs: build
        environment: staging

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: app-build
                  path: build

            - name: Simulate deploy to staging
              run: |
                  echo "Deploying artifact to staging..."
                  cat build/artifact.txt

    verify_staging:
        runs-on: ubuntu-latest
        needs: deploy_staging

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run smoke test
              run: PYTHONPATH=. pytest tests/test_smoke.py

    deploy_production:
        runs-on: ubuntu-latest
        needs: verify_staging
        environment: production

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: app-build
                  path: build

            - name: Simulate deploy to production
              run: |
                  echo "Deploying artifact to production..."
                  cat build/artifact.txt
